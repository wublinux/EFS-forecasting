name: MATLAB CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Set up MATLAB R2024b and toolboxes
        id: setup-matlab
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2024b
          products: >
            Fuzzy_Logic_Toolbox
            Global_Optimization_Toolbox
            Parallel_Computing_Toolbox
      - name: Run MATLAB unit and file-contract tests
        uses: matlab-actions/run-command@v3
        with:
          command: addpath('matlab'); results = runtests('tests/matlab'); assertSuccess(results)
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python benchmark dependencies
        run: pip install -e ".[benchmark]"
      - name: Prepare hash-identified MATLAB jobs
        run: >-
          python scripts/prepare_matlab_smoke_jobs.py
          --config configs/benchmark.smoke.yaml
          --cache ci-efs-cache
      - name: Execute prepared jobs with MATLAB Actions licensing
        uses: matlab-actions/run-command@v3
        with:
          command: >-
            addpath('matlab');
            jobs = dir(fullfile('ci-efs-cache','efs','**','job.json'));
            for k = 1:numel(jobs),
            adaptforecast.runJob(fullfile(jobs(k).folder,jobs(k).name));
            end
      - name: Run Python-to-MATLAB smoke benchmark
        run: adaptforecast benchmark --config configs/benchmark.smoke.yaml
        env:
          ADAPTFORECAST_EFS_CACHE_DIR: ${{ github.workspace }}/ci-efs-cache
      - name: Verify cross-language artifacts
        run: python scripts/verify_smoke_artifact.py artifacts
      - name: Upload audited synthetic smoke artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: synthetic-smoke-${{ github.sha }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14
