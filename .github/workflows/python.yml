name: Python CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev,docs]"
      - name: Lint
        run: ruff check src tests scripts
      - name: Test
        run: pytest --cov=adaptforecast --cov-report=term-missing
      - name: Validate sample data
        run: adaptforecast validate-data data/sample/synthetic_demand.csv
      - name: Build documentation
        run: mkdocs build --strict

